<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bit By Bit Advisory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=1.8" />
</head>
<body>
  <!-- Loading Page Overlay -->
  <div class="loader-overlay" id="loader-overlay">
    <div class="loader-content">
      <img class="dollar-note-img" src="/static/dollar_bill.jpg" alt="Loading Currency..." />
      <div class="loader-title">BIT BY BIT</div>
      <div class="loader-status">Initializing Secure Protocol...</div>
    </div>
  </div>

  <div class="bg-grid"></div>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg class="logo-icon" viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v18" stroke="var(--accent)" />
          <path d="M3 12h18" stroke="var(--accent)" />
          <path d="M7.75 7.75l8.5 8.5" stroke="var(--accent)" stroke-width="1" />
          <path d="M7.75 16.25l8.5-8.5" stroke="var(--accent)" stroke-width="1" />
          <circle cx="12" cy="12" r="3.5" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.5" />
          <circle cx="12" cy="12" r="1.5" fill="var(--accent)" />
        </svg>
        <span class="logo-text">Bit By Bit</span>
      </div>
      <button id="new-chat-btn" class="new-chat-btn">+ New Consultation</button>
      <div class="saved-chats-section">
        <div class="sidebar-title">Saved Consultations</div>
        <div class="saved-chats-list" id="saved-chats-list">
          <!-- Dynamically populated -->
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <section class="card chat-card" id="chat-container">
        <div class="chat-header">
          <div class="chat-header-info">
            <h2>Advisor Consultation</h2>
            <div class="status-indicator">
              <span class="indicator-dot"></span>
              <span class="indicator-text">Secure System</span>
            </div>
          </div>
          <span class="chat-tip" id="chat-tip" style="display: none;">Type <strong>stop</strong> to force report.</span>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- Intake Form or Chat Messages will go here -->
        </div>

        <form id="chat-form" style="display: none;">
          <input type="text" id="chat-input" placeholder="Type your answer here..." autocomplete="off" required />
          <button type="submit" id="chat-send-btn">Send</button>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/app.js?v=1.3"></script>
</body>
</html>
